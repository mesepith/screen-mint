<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Mint — Editor</title>
    <link rel="stylesheet" href="editor.css">
    <link rel="icon" href="icons/icon48.png" type="image/png">
</head>

<body>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
        <div class="loading-text">Preparing your recording…</div>
    </div>

    <!-- Processing Overlay -->
    <div class="processing-overlay" id="processingOverlay">
        <div class="processing-content">
            <div class="processing-spinner"></div>
            <div class="processing-text">Trimming video…</div>
            <div class="processing-subtext">This may take a moment</div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="toast-icon"></span>
        <span class="toast-text"></span>
    </div>

    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo-icon">🎬</div>
                <div>
                    <h1>Screen Mint</h1>
                    <div class="header-subtitle">Review, trim & download your recording</div>
                </div>
            </div>
            <div class="header-right">
                <div class="badge">
                    <span class="badge-dot"></span>
                    <span id="recordingInfo">Ready</span>
                </div>
            </div>
        </header>

        <!-- Video Player -->
        <div class="video-container">
            <div class="video-wrapper">
                <video id="videoPlayer" preload="auto"></video>
                <div class="play-overlay" id="playOverlay">
                    <div class="play-overlay-btn">
                        <svg viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls-bar">
                <!-- Play/Pause -->
                <button class="ctrl-btn" id="playPauseBtn" title="Play/Pause">
                    <svg id="playIcon" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                </button>

                <!-- Stop -->
                <button class="ctrl-btn" id="stopBtn" title="Stop">
                    <svg viewBox="0 0 24 24">
                        <path d="M6 6h12v12H6z" />
                    </svg>
                </button>

                <!-- Time -->
                <span class="time-display" id="timeDisplay">0:00 / 0:00</span>

                <!-- Progress bar -->
                <div class="progress-bar-container" id="progressContainer">
                    <div class="progress-track">
                        <div class="progress-filled" id="progressFilled">
                            <div class="progress-thumb"></div>
                        </div>
                    </div>
                </div>

                <!-- Volume -->
                <div class="volume-control">
                    <button class="ctrl-btn" id="muteBtn" title="Mute/Unmute">
                        <svg id="volumeOnIcon" viewBox="0 0 24 24">
                            <path
                                d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" />
                        </svg>
                        <svg id="volumeOffIcon" viewBox="0 0 24 24" style="display:none">
                            <path
                                d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
                        </svg>
                    </button>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1">
                </div>
            </div>
        </div>

        <!-- Trim Section -->
        <div class="trim-section">
            <div class="trim-header">
                <div class="trim-title">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M9.64 7.64c.23-.5.36-1.05.36-1.64 0-2.21-1.79-4-4-4S2 3.79 2 6s1.79 4 4 4c.59 0 1.14-.13 1.64-.36L10 12l-2.36 2.36C7.14 14.13 6.59 14 6 14c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4c0-.59-.13-1.14-.36-1.64L12 14l7 7h3v-1L9.64 7.64zM6 8c-1.1 0-2-.89-2-2s.9-2 2-2 2 .89 2 2-.9 2-2 2zm0 12c-1.1 0-2-.89-2-2s.9-2 2-2 2 .89 2 2-.9 2-2 2zm6-7.5c-.28 0-.5-.22-.5-.5s.22-.5.5-.5.5.22.5.5-.22.5-.5.5zM19 3l-6 6 2 2 7-7V3h-3z" />
                    </svg>
                    Trim Video
                </div>
                <span class="trim-info" id="trimInfo">Drag handles to set trim range</span>
            </div>

            <!-- Timeline with handles -->
            <div class="trim-timeline" id="trimTimeline">
                <canvas class="trim-waveform" id="trimWaveform"></canvas>
                <div class="trim-region" id="trimRegion">
                    <div class="trim-handle trim-handle-left" id="trimHandleLeft"></div>
                    <div class="trim-handle trim-handle-right" id="trimHandleRight"></div>
                </div>
                <div class="trim-playhead" id="trimPlayhead"></div>
            </div>

            <!-- Trim time inputs & reset -->
            <div class="trim-controls">
                <div class="trim-input-group">
                    <span class="trim-label">Start</span>
                    <input type="text" class="trim-time-input" id="trimStartInput" value="0:00.0" readonly>
                </div>
                <span class="trim-separator">→</span>
                <div class="trim-input-group">
                    <span class="trim-label">End</span>
                    <input type="text" class="trim-time-input" id="trimEndInput" value="0:00.0" readonly>
                </div>
                <div class="trim-duration-badge" id="trimDurationBadge">
                    Duration: <strong id="trimDurationValue">0:00</strong>
                </div>
                <button class="trim-reset-btn" id="trimResetBtn">Reset Trim</button>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="actions">
            <button class="action-btn btn-download" id="downloadOriginalBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" />
                </svg>
                Download Original
            </button>
            <button class="action-btn btn-download-trimmed" id="downloadTrimmedBtn">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M9.64 7.64c.23-.5.36-1.05.36-1.64 0-2.21-1.79-4-4-4S2 3.79 2 6s1.79 4 4 4c.59 0 1.14-.13 1.64-.36L10 12l-2.36 2.36C7.14 14.13 6.59 14 6 14c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4c0-.59-.13-1.14-.36-1.64L12 14l7 7h3v-1L9.64 7.64zM6 8c-1.1 0-2-.89-2-2s.9-2 2-2 2 .89 2 2-.9 2-2 2zm0 12c-1.1 0-2-.89-2-2s.9-2 2-2 2 .89 2 2-.9 2-2 2z" />
                </svg>
                Download Trimmed
            </button>
            <div class="actions-spacer"></div>
            <button class="action-btn btn-discard" id="discardBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" />
                </svg>
                Discard
            </button>
        </div>
    </div>

    <script src="editor.js"></script>
</body>

</html>
