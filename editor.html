<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Mint — Editor</title>
    <link rel="stylesheet" href="editor.css">
    <link rel="icon" href="icons/icon48.png" type="image/png">
</head>

<body>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
        <div class="loading-text">Preparing your recording…</div>
    </div>

    <!-- Processing Overlay -->
    <div class="processing-overlay" id="processingOverlay">
        <div class="processing-content">
            <div class="processing-spinner"></div>
            <div class="processing-text">Processing video…</div>
            <div class="processing-subtext">This may take a moment</div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="toast-icon"></span>
        <span class="toast-text"></span>
    </div>

    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo-icon">🎬</div>
                <div>
                    <h1>Screen Mint</h1>
                    <div class="header-subtitle">Review, cut &amp; download your recording</div>
                </div>
            </div>
            <div class="header-right">
                <div class="badge">
                    <span class="badge-dot"></span>
                    <span id="recordingInfo">Ready</span>
                </div>
                <!-- Action Buttons -->
                <div class="size-control"
                    style="display: flex; align-items: center; gap: 8px; margin-right: 16px; padding-right: 16px; border-right: 1px solid var(--border-color);">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="var(--text-secondary)">
                        <path
                            d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14zm2.5-4h-2v2H9v-2H7V9h2V7h1.5v2h2v1.5z" />
                    </svg>
                    <input type="range" class="volume-slider" id="videoSizeSlider" title="Resize Video Player" min="30"
                        max="100" step="1" value="100" style="width: 80px;">
                </div>
                <button class="action-btn btn-discard" id="discardBtn" style="padding: 8px 16px; font-size: 0.8rem;">
                    <svg viewBox="0 0 24 24">
                        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" />
                    </svg>
                    Discard
                </button>
                <button class="action-btn btn-download" id="downloadBtn" style="padding: 8px 16px; font-size: 0.8rem;">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" />
                    </svg>
                    Download
                </button>
            </div>
    </div>
    </header>

    <!-- Video Player -->
    <div class="video-container">
        <div class="video-toolbar hidden" id="videoToolbar">
            <button class="editor-btn btn-split" id="splitBtn"
                title="Split the timeline at the current playhead position (S)">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M9.64 7.64c.23-.5.36-1.05.36-1.64 0-2.21-1.79-4-4-4S2 3.79 2 6s1.79 4 4 4c.59 0 1.14-.13 1.64-.36L10 12l-2.36 2.36C7.14 14.13 6.59 14 6 14c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4c0-.59-.13-1.14-.36-1.64L12 14l7 7h3v-1L9.64 7.64zM6 8c-1.1 0-2-.89-2-2s.9-2 2-2 2 .89 2 2-.9 2-2 2zm0 12c-1.1 0-2-.89-2-2s.9-2 2-2 2 .89 2 2-.9 2-2 2zm6-7.5c-.28 0-.5-.22-.5-.5s.22-.5.5-.5.5.22.5.5-.22.5-.5.5zM19 3l-6 6 2 2 7-7V3h-3z" />
                </svg>
                Split Here
            </button>
        </div>
        <div class="video-wrapper">
            <video id="videoPlayer" preload="auto"></video>
            <canvas id="overlayCanvas" class="overlay-canvas"></canvas>
            <div id="overlayInteractionLayer" class="overlay-interaction-layer"></div>
            <div class="play-overlay" id="playOverlay">
                <div class="play-overlay-btn">
                    <svg viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls-bar">
            <button class="ctrl-btn" id="playPauseBtn" title="Play/Pause">
                <svg id="playIcon" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z" />
                </svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                </svg>
            </button>

            <button class="ctrl-btn" id="stopBtn" title="Stop">
                <svg viewBox="0 0 24 24">
                    <path d="M6 6h12v12H6z" />
                </svg>
            </button>

            <span class="time-display" id="timeDisplay">0:00 / 0:00</span>

            <div class="progress-bar-container" id="progressContainer">
                <div class="progress-track">
                    <div class="progress-filled" id="progressFilled">
                        <div class="progress-thumb"></div>
                    </div>
                </div>
            </div>

            <div class="volume-control">
                <button class="ctrl-btn" id="muteBtn" title="Mute/Unmute">
                    <svg id="volumeOnIcon" viewBox="0 0 24 24">
                        <path
                            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" />
                    </svg>
                    <svg id="volumeOffIcon" viewBox="0 0 24 24" style="display:none">
                        <path
                            d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
                    </svg>
                </button>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1">
            </div>
        </div>
    </div>

    <!-- Overlay Tracks Section -->
    <div class="overlay-tracks-section" id="overlayTracksSection">

        <div class="overlay-tracks-container" id="overlayTracksContainer">
            <!-- Track rows will be rendered here by JS -->
        </div>

        <button class="editor-btn btn-add-track" id="addTrackBtn">
            <svg viewBox="0 0 24 24">
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
            </svg>
            Add Track
        </button>
    </div>

    <!-- Editor Section -->
    <div class="editor-section" id="editorSection">
        <div class="editor-header">
            <div class="editor-title">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M9.64 7.64c.23-.5.36-1.05.36-1.64 0-2.21-1.79-4-4-4S2 3.79 2 6s1.79 4 4 4c.59 0 1.14-.13 1.64-.36L10 12l-2.36 2.36C7.14 14.13 6.59 14 6 14c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4c0-.59-.13-1.14-.36-1.64L12 14l7 7h3v-1L9.64 7.64zM6 8c-1.1 0-2-.89-2-2s.9-2 2-2 2 .89 2 2-.9 2-2 2zm0 12c-1.1 0-2-.89-2-2s.9-2 2-2 2 .89 2 2-.9 2-2 2zm6-7.5c-.28 0-.5-.22-.5-.5s.22-.5.5-.5.5.22.5.5-.22.5-.5.5zM19 3l-6 6 2 2 7-7V3h-3z" />
                </svg>
                Edit &amp; Cut
            </div>
            <span class="editor-info" id="editorInfo">Split the timeline, then click any part to remove it</span>
        </div>

        <!-- Unified Timeline -->
        <div class="timeline" id="timeline">
            <canvas class="timeline-waveform" id="timelineWaveform"></canvas>
            <div class="timeline-segments-layer" id="timelineSegmentsLayer"></div>
            <div class="timeline-splits-layer" id="timelineSplitsLayer"></div>
            <div class="timeline-playhead" id="timelinePlayhead"></div>
        </div>

        <!-- Time labels -->
        <div class="timeline-labels">
            <span class="timeline-label-time" id="timelineLabelStart">0:00.0</span>
            <span class="timeline-label-time" id="timelineLabelEnd">0:00.0</span>
        </div>

        <!-- Editor Controls -->
        <div class="editor-controls" id="editorControls">
            <button class="editor-btn btn-remove-section" id="removeSectionBtn" style="display:none"
                title="Remove the selected section">
                <svg viewBox="0 0 24 24">
                    <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" />
                </svg>
                Remove This Section
            </button>
            <button class="editor-btn btn-restore-section" id="restoreSectionBtn" style="display:none"
                title="Restore the selected section">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z" />
                </svg>
                Restore Section
            </button>
            <button class="editor-btn btn-cancel" id="deselectBtn" style="display:none">
                Deselect
            </button>
            <div class="editor-controls-spacer"></div>
            <button class="editor-btn btn-undo-cuts" id="resetAllBtn" style="display:none"
                title="Remove all splits and restore everything">
                Reset All
            </button>
        </div>
    </div>

    <!-- Overlay Edit Popover -->
    <div class="overlay-edit-popover" id="overlayEditPopover" style="display:none">
        <div class="popover-header">
            <span class="popover-title">Edit Text Overlay</span>
            <button class="popover-close" id="popoverClose">&times;</button>
        </div>
        <div class="popover-body">
            <label class="popover-label">Text</label>
            <textarea class="popover-input" id="popoverText" rows="2" placeholder="Enter overlay text…"></textarea>
            <div class="popover-row">
                <div class="popover-field">
                    <label class="popover-label">Font Size</label>
                    <input type="number" class="popover-input popover-input-sm" id="popoverFontSize" value="32" min="8"
                        max="200">
                </div>
                <div class="popover-field">
                    <label class="popover-label">Color</label>
                    <input type="color" class="popover-color" id="popoverColor" value="#ffffff">
                </div>
                <div class="popover-field">
                    <label class="popover-label">Duration (s)</label>
                    <input type="number" class="popover-input popover-input-sm" id="popoverDuration" value="3" min="0.5"
                        max="60" step="0.5">
                </div>
            </div>
            <div class="popover-row">
                <div class="popover-field">
                    <label class="popover-label">X Position (%)</label>
                    <input type="number" class="popover-input popover-input-sm" id="popoverX" value="50" min="0"
                        max="100">
                </div>
                <div class="popover-field">
                    <label class="popover-label">Y Position (%)</label>
                    <input type="number" class="popover-input popover-input-sm" id="popoverY" value="50" min="0"
                        max="100">
                </div>
            </div>
            <button class="editor-btn btn-split popover-save" id="popoverSave">Save</button>
        </div>
    </div>


    </div>

    <script src="editor.js"></script>
</body>

</html>
